thresholds:
  eye_aspect_ratio: 0.22
  mouth_aspect_ratio: 0.50
  head_offset: 0.42
  phone_confidence: 0.05
  phone_use_frames: 2
  phone_hold_frames: 12
  missing_face_frames: 8
  eye_closed_frames: 8
  drowsy_frames: 36
  yawn_frames: 6
  distracted_frames: 12
vision:
  provider: auto
  face_landmarker_model: models/face_landmarker.task
  fallback_to_haar: true
  process_every_n_frames: 1
  draw_landmarks: true
object_detector:
  enabled: true
  provider: onnx
  model_path: models/driver-objects.onnx
  labels_path: models/driver-objects.labels
  confidence_threshold: 0.03
  iou_threshold: 0.45
  phone_labels:
    - cell phone
    - phone
    - mobile
runtime:
  output_fps: null
  max_frames: null
  display: false
  write_video: true
  alert_cooldown_seconds: 2.0
report:
  unsafe_threshold: 0.45
  timeline_stride_frames: 3
